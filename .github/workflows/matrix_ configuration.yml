name: matrix congiguration

on:
  push:
  workflow_dispatch:

jobs: 
  deploy:
      strategy:
        matrix:
          os: [ubuntu-latest, ubuntu-2-.4, windows-latest]
          Images: [hello world, alpine]


    
      runs-on: ${{matrix.os}}
      steps:
      - name: Echo Docker Details
        run: docker info
      - name: Run Images on ${{matrix.os}}
        run: docker run ${{matrix.Images}} 



    
